<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResearchDesk — 증권·경제 분석 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="posts.js"></script>
<style>
/* ── 리셋 & CSS 변수 ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0f11;
  --surface:  #15171a;
  --card:     #1b1e22;
  --border:   #2a2d32;
  --accent:   #c8a96e;      /* 황금빛 */
  --accent2:  #5e9bdc;      /* 블루 */
  --text:     #e8e4dc;
  --muted:    #7a7d84;
  --tag-bg:   #232730;

  --cat-industry: #5e9bdc;
  --cat-company:  #7fc97a;
  --cat-bok:      #e07b54;
  --cat-macro:    #a67fd6;

  --serif:  'Noto Serif KR', serif;
  --sans:   'Noto Sans KR', sans-serif;
  --mono:   'DM Mono', monospace;

  --r: 6px;
  --r-lg: 12px;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ── 스크롤바 ───────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── 헤더 ──────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(14,15,17,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .04em;
  text-decoration: none;
}
.logo span { color: var(--text); font-weight: 400; }

.header-right {
  display: flex;
  align-items: center;
  gap: 1.2rem;
}

/* ── 히어로 배너 ─────────────────────────────────── */
.hero {
  background: linear-gradient(135deg, #0e0f11 0%, #161a20 60%, #1a1510 100%);
  border-bottom: 1px solid var(--border);
  padding: 3.5rem 2rem 2.8rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 50%, rgba(200,169,110,.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(94,155,220,.05) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner { max-width: 860px; position: relative; }
.hero-eyebrow {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--accent);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: .8rem;
}
.hero h1 {
  font-family: var(--serif);
  font-size: 2.2rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 1rem;
}
.hero h1 em {
  font-style: normal;
  color: var(--accent);
}
.hero-desc {
  color: var(--muted);
  font-size: .93rem;
  max-width: 560px;
  line-height: 1.8;
}

/* ── 필터 바 ─────────────────────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: 1.1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
}
.filter-label {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-right: .4rem;
}
.filter-btn {
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 500;
  padding: .3rem .85rem;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0e0f11;
  font-weight: 700;
}
.filter-btn[data-cat="industry"].active  { background: var(--cat-industry); border-color: var(--cat-industry); }
.filter-btn[data-cat="company"].active   { background: var(--cat-company);  border-color: var(--cat-company); }
.filter-btn[data-cat="bok"].active       { background: var(--cat-bok);      border-color: var(--cat-bok); }
.filter-btn[data-cat="macro"].active     { background: var(--cat-macro);    border-color: var(--cat-macro); }

.search-wrap {
  margin-left: auto;
  position: relative;
}
.search-wrap input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--sans);
  font-size: .82rem;
  padding: .32rem 2.2rem .32rem .8rem;
  width: 200px;
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap svg {
  position: absolute;
  right: .65rem;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

/* ── 메인 레이아웃 ───────────────────────────────── */
.page { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }

/* ── 게시물 그리드 ──────────────────────────────── */
#post-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.2rem;
}
.no-results {
  grid-column: 1/-1;
  text-align: center;
  padding: 4rem;
  color: var(--muted);
  font-size: .95rem;
}

/* ── 카드 ────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.3rem 1.4rem 1.2rem;
  cursor: pointer;
  transition: border-color .22s, transform .22s, box-shadow .22s;
  display: flex;
  flex-direction: column;
  gap: .7rem;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .22s;
}
.card[data-cat="industry"]::before { background: var(--cat-industry); }
.card[data-cat="company"]::before  { background: var(--cat-company); }
.card[data-cat="bok"]::before      { background: var(--cat-bok); }
.card[data-cat="macro"]::before    { background: var(--cat-macro); }

.card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,.35);
}
.card:hover::before { opacity: 1; }

.card-meta {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
.cat-badge {
  font-family: var(--mono);
  font-size: .68rem;
  font-weight: 500;
  letter-spacing: .06em;
  padding: .18rem .55rem;
  border-radius: 4px;
  text-transform: uppercase;
}
[data-cat="industry"] .cat-badge { background: rgba(94,155,220,.15); color: var(--cat-industry); }
[data-cat="company"]  .cat-badge { background: rgba(127,201,122,.15); color: var(--cat-company); }
[data-cat="bok"]      .cat-badge { background: rgba(224,123,84,.15);  color: var(--cat-bok); }
[data-cat="macro"]    .cat-badge { background: rgba(166,127,214,.15); color: var(--cat-macro); }

.card-source {
  font-size: .76rem;
  color: var(--muted);
  font-weight: 500;
}
.card-date {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  margin-left: auto;
}
.card h2 {
  font-family: var(--serif);
  font-size: 1.02rem;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text);
}
.card-summary {
  font-size: .83rem;
  color: var(--muted);
  line-height: 1.65;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
  margin-top: auto;
}
.tag {
  font-family: var(--mono);
  font-size: .68rem;
  background: var(--tag-bg);
  color: var(--muted);
  padding: .15rem .5rem;
  border-radius: 4px;
  transition: color .18s;
}
.card:hover .tag { color: var(--text); }

/* ── 모달 ────────────────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 3vh 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  overflow-y: auto;
}
.modal-backdrop.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 720px;
  padding: 2rem 2.2rem 2.4rem;
  position: relative;
  transform: translateY(20px);
  transition: transform .28s cubic-bezier(.22,1,.36,1);
  margin: auto;
}
.modal-backdrop.open .modal { transform: translateY(0); }

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.3rem;
  cursor: pointer;
  line-height: 1;
  padding: .2rem .4rem;
  border-radius: 4px;
  transition: color .15s, background .15s;
}
.modal-close:hover { color: var(--text); background: var(--border); }

.modal-header { margin-bottom: 1.4rem; }
.modal-meta {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: .8rem;
  flex-wrap: wrap;
}
.modal-title {
  font-family: var(--serif);
  font-size: 1.45rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: .7rem;
}
.modal-summary {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.75;
  padding: .9rem 1.1rem;
  background: var(--surface);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--r) var(--r) 0;
  margin-bottom: 1.2rem;
}

/* ── 마크다운 스타일 렌더 ─────────────────────────── */
.modal-body { font-size: .9rem; line-height: 1.85; color: var(--text); }
.modal-body h2 {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  margin: 1.6rem 0 .6rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.modal-body h3 {
  font-size: .92rem;
  font-weight: 700;
  color: var(--text);
  margin: 1.1rem 0 .4rem;
}
.modal-body p { margin-bottom: .9rem; }
.modal-body ul, .modal-body ol {
  padding-left: 1.4rem;
  margin-bottom: .9rem;
}
.modal-body li { margin-bottom: .3rem; }
.modal-body strong { color: var(--accent); font-weight: 700; }
.modal-body table {
  width: 100%;
  border-collapse: collapse;
  font-size: .84rem;
  margin: 1rem 0;
  font-family: var(--mono);
}
.modal-body th {
  background: var(--surface);
  padding: .5rem .75rem;
  text-align: left;
  color: var(--muted);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
}
.modal-body td {
  padding: .45rem .75rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.modal-body tr:last-child td { border-bottom: none; }
.modal-body blockquote {
  border-left: 3px solid var(--accent2);
  padding: .5rem 1rem;
  color: var(--muted);
  font-style: italic;
  background: rgba(94,155,220,.05);
  border-radius: 0 var(--r) var(--r) 0;
  margin: .8rem 0;
}
.modal-body code {
  font-family: var(--mono);
  font-size: .84em;
  background: var(--surface);
  padding: .1rem .35rem;
  border-radius: 3px;
  color: var(--accent);
}

/* ── 푸터 ────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.8rem 2rem;
  text-align: center;
  font-size: .78rem;
  color: var(--muted);
  background: var(--surface);
}
footer a { color: var(--accent); text-decoration: none; }

/* ── 반응형 ──────────────────────────────────────── */
@media (max-width: 640px) {
  .hero h1 { font-size: 1.6rem; }
  .page { padding: 1.4rem 1rem 3rem; }
  #post-grid { grid-template-columns: 1fr; }
  .search-wrap { width: 100%; }
  .search-wrap input { width: 100%; }
  .filter-bar { gap: .45rem; }
}
</style>
</head>
<body>

<!-- ── 헤더 ──────────────────────────────────── -->
<header>
  <a class="logo" href="#">Research<span>Desk</span></a>
  <div class="header-right">
    <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);" id="post-count-header"></span>
  </div>
</header>

<!-- ── 히어로 ─────────────────────────────────── -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">증권사 리포트 &amp; 한국은행 보고서 아카이브</div>
    <h1>산업·기업·거시 분석을<br><em>한 곳에서</em> 읽는다.</h1>
    <p class="hero-desc">국내 주요 증권사의 산업·기업 분석 리포트와 한국은행 공식 보고서를 정리·요약해 제공합니다. 카테고리 필터와 검색으로 원하는 자료를 빠르게 찾아보세요.</p>
  </div>
</div>

<!-- ── 필터 바 ────────────────────────────────── -->
<div class="filter-bar">
  <span class="filter-label">필터</span>
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="industry">산업 분석</button>
  <button class="filter-btn" data-cat="company">기업 분석</button>
  <button class="filter-btn" data-cat="bok">한국은행</button>
  <button class="filter-btn" data-cat="macro">경제 지표</button>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="제목·태그 검색…" />
    <svg width="14" height="14" fill="none" stroke="#7a7d84" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
  </div>
</div>

<!-- ── 게시물 그리드 ──────────────────────────── -->
<main class="page">
  <div id="post-grid"></div>
</main>

<!-- ── 모달 ──────────────────────────────────── -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ── 푸터 ──────────────────────────────────── -->
<footer>
  <p>ResearchDesk &mdash; 개인 리서치 아카이브 &nbsp;|&nbsp; 본 사이트의 자료는 투자 권유가 아닙니다.</p>
</footer>

<script>
/* ================================================================
   렌더링 & 인터랙션 스크립트
   ================================================================ */

// ── 카테고리 라벨 ─────────────────────────────────────────────
const CAT_LABEL = {
  industry: '산업 분석',
  company:  '기업 분석',
  bok:      '한국은행',
  macro:    '경제 지표'
};

// ── 날짜 포맷 ──────────────────────────────────────────────────
function fmtDate(d) {
  const [y, m, day] = d.split('-');
  return `${y}.${m}.${day}`;
}

// ── 간단 마크다운 → HTML 변환 ──────────────────────────────────
function mdToHtml(md) {
  const lines = md.trim().split('\n');
  let html = '';
  let inUl = false, inOl = false, inTable = false, tableRows = [];

  const flushList = () => {
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
  };
  const flushTable = () => {
    if (!inTable) return;
    html += '<table>';
    tableRows.forEach((row, i) => {
      if (i === 1) return; // 구분선 행 스킵
      const cells = row.split('|').map(c => c.trim()).filter(c => c !== '');
      const tag = i === 0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('') + '</tr>';
    });
    html += '</table>';
    inTable = false;
    tableRows = [];
  };

  const inline = s => s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');

  for (const raw of lines) {
    const line = raw;

    // 테이블 감지
    if (line.includes('|')) {
      flushList();
      inTable = true;
      tableRows.push(line);
      continue;
    } else {
      flushTable();
    }

    if (line.startsWith('## ')) {
      flushList();
      html += `<h2>${inline(line.slice(3))}</h2>`;
    } else if (line.startsWith('### ')) {
      flushList();
      html += `<h3>${inline(line.slice(4))}</h3>`;
    } else if (/^\d+\.\s/.test(line)) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += `<li>${inline(line.replace(/^\d+\.\s/, ''))}</li>`;
    } else if (line.startsWith('- ')) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
    } else if (line.startsWith('> ')) {
      flushList();
      html += `<blockquote>${inline(line.slice(2))}</blockquote>`;
    } else if (line.trim() === '') {
      flushList();
    } else {
      flushList();
      html += `<p>${inline(line)}</p>`;
    }
  }
  flushList();
  flushTable();
  return html;
}

// ── 카드 HTML 생성 ────────────────────────────────────────────
function renderCard(p) {
  return `
  <article class="card" data-cat="${p.category}" data-id="${p.id}" tabindex="0">
    <div class="card-meta">
      <span class="cat-badge">${CAT_LABEL[p.category] || p.category}</span>
      <span class="card-source">${p.source}</span>
      <span class="card-date">${fmtDate(p.date)}</span>
    </div>
    <h2>${p.title}</h2>
    <p class="card-summary">${p.summary}</p>
    <div class="card-tags">
      ${p.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
    </div>
  </article>`;
}

// ── 게시물 렌더 ───────────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function renderPosts() {
  const grid = document.getElementById('post-grid');
  const sorted = [...POSTS].sort((a,b) => b.date.localeCompare(a.date));
  const filtered = sorted.filter(p => {
    const catOk = currentFilter === 'all' || p.category === currentFilter;
    const q = currentSearch.toLowerCase();
    const searchOk = !q ||
      p.title.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.source.toLowerCase().includes(q) ||
      p.summary.toLowerCase().includes(q);
    return catOk && searchOk;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
    // 카드 클릭 이벤트
    grid.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(+card.dataset.id));
      card.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(+card.dataset.id); });
    });
  }

  document.getElementById('post-count-header').textContent =
    `${filtered.length} / ${POSTS.length} 건`;
}

// ── 모달 ──────────────────────────────────────────────────────
function openModal(id) {
  const p = POSTS.find(x => x.id === id);
  if (!p) return;

  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="modal-header">
      <div class="modal-meta">
        <span class="cat-badge" style="${catBadgeInlineStyle(p.category)}">${CAT_LABEL[p.category]}</span>
        <span style="font-size:.8rem;color:var(--muted);font-weight:500;">${p.source}</span>
        <span style="font-family:var(--mono);font-size:.75rem;color:var(--muted);margin-left:auto;">${fmtDate(p.date)}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-summary">${p.summary}</div>
      <div class="card-tags" style="margin-top:.6rem;">
        ${p.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
      </div>
    </div>
    <div class="modal-body">${mdToHtml(p.content)}</div>`;

  const backdrop = document.getElementById('modal-backdrop');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function catBadgeInlineStyle(cat) {
  const map = {
    industry: 'background:rgba(94,155,220,.15);color:var(--cat-industry)',
    company:  'background:rgba(127,201,122,.15);color:var(--cat-company)',
    bok:      'background:rgba(224,123,84,.15);color:var(--cat-bok)',
    macro:    'background:rgba(166,127,214,.15);color:var(--cat-macro)'
  };
  return map[cat] || '';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── 필터 버튼 ─────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    renderPosts();
  });
});

// ── 검색 ──────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderPosts();
});

// ── 초기 렌더 ─────────────────────────────────────────────────
renderPosts();
</script>
</body>
</html>
