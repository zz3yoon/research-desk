<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Readysearch — 증권·경제 분석 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="posts.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --card:      #ffffff;
  --border:    #e0d9ce;
  --border2:   #ccc4b6;
  --accent:    #2c5282;
  --accent2:   #c07d3a;
  --text:      #1a1814;
  --text2:     #4a4540;
  --muted:     #8a8078;
  --tag-bg:    #ede9e1;

  --cat-industry: #2563a8;
  --cat-company:  #2a7a4b;
  --cat-bok:      #b84c1e;
  --cat-macro:    #7c3aad;

  --up:   #c0392b;
  --down: #1a6fb5;

  --serif: 'Noto Serif KR', serif;
  --sans:  'Noto Sans KR', sans-serif;
  --mono:  'DM Mono', monospace;
  --r:    6px;
  --r-lg: 12px;
}

html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.7; min-height: 100vh; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── 헤더 ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,244,239,.96); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: .55rem; text-decoration: none; }
.logo-text { font-family: var(--serif); font-size: 1.15rem; font-weight: 700; color: var(--accent); letter-spacing: .02em; }
.logo-text span { color: var(--accent2); }
.header-right { font-family: var(--mono); font-size: .72rem; color: var(--muted); }

/* ── 지표 배너 ── */
.indicators {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: .6rem 2rem;
  overflow-x: auto;
  white-space: nowrap;
}
.indicators-inner { display: inline-flex; gap: 0; min-width: 100%; }
.ind-item {
  display: inline-flex; flex-direction: column;
  padding: .4rem 1.4rem;
  border-right: 1px solid var(--border);
  min-width: 120px;
}
.ind-item:first-child { padding-left: 0; }
.ind-item:last-child  { border-right: none; }
.ind-label { font-family: var(--mono); font-size: .65rem; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: .1rem; }
.ind-value { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--text); }
.ind-change { font-family: var(--mono); font-size: .7rem; margin-top: .08rem; }
.ind-change.up   { color: var(--up); }
.ind-change.down { color: var(--down); }
.ind-change.flat { color: var(--muted); }
.ind-note { font-size: .65rem; color: var(--muted); margin-top: .06rem; }

/* ── 히어로 ── */
.hero {
  background: linear-gradient(160deg, #ffffff 0%, #f0ece3 100%);
  border-bottom: 1px solid var(--border);
  padding: 3rem 2rem 2.5rem;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 50% 70% at 90% 50%, rgba(44,82,130,.04) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner { max-width: 820px; position: relative; }
.hero-eyebrow {
  font-family: var(--mono); font-size: .7rem; color: var(--accent2);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: .7rem;
  display: flex; align-items: center; gap: .5rem;
}
.hero-eyebrow::before { content: ''; display: inline-block; width: 16px; height: 1px; background: var(--accent2); }
.hero h1 { font-family: var(--serif); font-size: 1.95rem; font-weight: 700; line-height: 1.35; color: var(--text); margin-bottom: .85rem; }
.hero h1 em { font-style: normal; color: var(--accent); border-bottom: 2px solid var(--accent2); padding-bottom: 1px; }
.hero-desc { color: var(--text2); font-size: .9rem; max-width: 520px; line-height: 1.85; }

/* ── 필터 바 ── */
.filter-bar {
  display: flex; align-items: center; gap: .5rem;
  padding: .85rem 2rem; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-wrap: wrap;
  position: sticky; top: 58px; z-index: 90;
}
.filter-label { font-family: var(--mono); font-size: .67rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-right: .3rem; }
.filter-btn {
  font-family: var(--sans); font-size: .79rem; font-weight: 500;
  padding: .26rem .78rem; border-radius: 100px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; transition: all .18s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.filter-btn[data-cat="industry"].active { background: var(--cat-industry); border-color: var(--cat-industry); }
.filter-btn[data-cat="company"].active  { background: var(--cat-company);  border-color: var(--cat-company); }
.filter-btn[data-cat="bok"].active      { background: var(--cat-bok);      border-color: var(--cat-bok); }
.filter-btn[data-cat="macro"].active    { background: var(--cat-macro);    border-color: var(--cat-macro); }

.search-wrap { margin-left: auto; position: relative; }
.search-wrap input {
  background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--text); font-family: var(--sans); font-size: .81rem;
  padding: .28rem 2rem .28rem .72rem; width: 200px; outline: none; transition: border-color .18s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap svg { position: absolute; right: .6rem; top: 50%; transform: translateY(-50%); pointer-events: none; }

/* ── 메인 ── */
.page { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }
#post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.1rem; }
.no-results { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--muted); font-size: .95rem; }

/* ── 카드 ── */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 1.2rem 1.3rem 1.1rem; cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  display: flex; flex-direction: column; gap: .62rem;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  opacity: 0; transition: opacity .2s; border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.card[data-cat="industry"]::before { background: var(--cat-industry); }
.card[data-cat="company"]::before  { background: var(--cat-company); }
.card[data-cat="bok"]::before      { background: var(--cat-bok); }
.card[data-cat="macro"]::before    { background: var(--cat-macro); }
.card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,0,0,.08); }
.card:hover::before { opacity: 1; }

.card-meta { display: flex; align-items: center; gap: .42rem; flex-wrap: wrap; }
.cat-badge { font-family: var(--mono); font-size: .66rem; font-weight: 500; letter-spacing: .05em; padding: .14rem .48rem; border-radius: 4px; text-transform: uppercase; }
[data-cat="industry"] .cat-badge { background: rgba(37,99,168,.1);  color: var(--cat-industry); }
[data-cat="company"]  .cat-badge { background: rgba(42,122,75,.1);  color: var(--cat-company); }
[data-cat="bok"]      .cat-badge { background: rgba(184,76,30,.1);  color: var(--cat-bok); }
[data-cat="macro"]    .cat-badge { background: rgba(124,58,173,.1); color: var(--cat-macro); }

.card-source { font-size: .74rem; color: var(--text2); font-weight: 500; }
.card-date   { font-family: var(--mono); font-size: .69rem; color: var(--muted); margin-left: auto; }
.card h2     { font-family: var(--serif); font-size: .98rem; font-weight: 600; line-height: 1.5; color: var(--text); }
.card-summary { font-size: .81rem; color: var(--text2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-tags   { display: flex; flex-wrap: wrap; gap: .28rem; margin-top: auto; }
.tag { font-family: var(--mono); font-size: .66rem; background: var(--tag-bg); color: var(--muted); padding: .12rem .42rem; border-radius: 4px; transition: color .15s; }
.card:hover .tag { color: var(--text2); }

/* ── 모달 ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(26,24,20,.5); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: flex-start; justify-content: center;
  padding: 3vh 1rem; opacity: 0; pointer-events: none; transition: opacity .22s; overflow-y: auto;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  width: 100%; max-width: 720px; padding: 2rem 2.2rem 2.4rem; position: relative;
  transform: translateY(16px); transition: transform .26s cubic-bezier(.22,1,.36,1);
  margin: auto; box-shadow: 0 20px 60px rgba(0,0,0,.1);
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; line-height: 1; padding: .2rem .4rem; border-radius: 4px; transition: color .15s, background .15s; }
.modal-close:hover { color: var(--text); background: var(--tag-bg); }

.modal-header { margin-bottom: 1.2rem; }
.modal-meta   { display: flex; align-items: center; gap: .52rem; margin-bottom: .72rem; flex-wrap: wrap; }
.modal-title  { font-family: var(--serif); font-size: 1.38rem; font-weight: 700; line-height: 1.4; margin-bottom: .62rem; }
.modal-summary { font-size: .87rem; color: var(--text2); line-height: 1.78; padding: .82rem 1rem; background: var(--bg); border-left: 3px solid var(--accent2); border-radius: 0 var(--r) var(--r) 0; margin-bottom: 1rem; }

.modal-body { font-size: .9rem; line-height: 1.85; color: var(--text); }
.modal-body h2 { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: var(--accent); margin: 1.4rem 0 .52rem; padding-bottom: .28rem; border-bottom: 1px solid var(--border); }
.modal-body h3 { font-size: .9rem; font-weight: 700; color: var(--text); margin: .95rem 0 .32rem; }
.modal-body p  { margin-bottom: .82rem; }
.modal-body ul, .modal-body ol { padding-left: 1.3rem; margin-bottom: .82rem; }
.modal-body li { margin-bottom: .26rem; }
.modal-body strong { color: var(--accent); font-weight: 700; }
.modal-body table { width: 100%; border-collapse: collapse; font-size: .82rem; margin: .95rem 0; font-family: var(--mono); }
.modal-body th { background: var(--bg); padding: .45rem .68rem; text-align: left; color: var(--muted); font-size: .71rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
.modal-body td { padding: .4rem .68rem; border-bottom: 1px solid var(--border); }
.modal-body tr:last-child td { border-bottom: none; }
.modal-body blockquote { border-left: 3px solid var(--cat-industry); padding: .48rem .95rem; color: var(--text2); font-style: italic; background: rgba(37,99,168,.04); border-radius: 0 var(--r) var(--r) 0; margin: .75rem 0; }
.modal-body code { font-family: var(--mono); font-size: .84em; background: var(--tag-bg); padding: .09rem .3rem; border-radius: 3px; color: var(--accent); }

/* ── 푸터 ── */
footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; font-size: .76rem; color: var(--muted); background: var(--surface); }

@media (max-width: 640px) {
  .hero h1 { font-size: 1.5rem; }
  .page { padding: 1.2rem 1rem 3rem; }
  #post-grid { grid-template-columns: 1fr; }
  .search-wrap { width: 100%; }
  .search-wrap input { width: 100%; }
  .ind-item { min-width: 105px; padding: .35rem .9rem; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <a class="logo" href="#">
    <svg width="26" height="22" viewBox="0 0 26 22" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <path d="M2 20 A11 11 0 0 1 24 20" stroke="#2c5282" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <line x1="13" y1="20" x2="13" y2="8" stroke="#c07d3a" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="13" cy="20" r="2.2" fill="#c07d3a"/>
    </svg>
    <span class="logo-text">Ready<span>search</span></span>
  </a>
  <div class="header-right" id="post-count-header"></div>
</header>

<!-- 지표 배너 -->
<div class="indicators">
  <div class="indicators-inner" id="indicators-inner"></div>
</div>

<!-- 히어로 -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">증권사 리포트 &amp; 한국은행 보고서 아카이브</div>
    <h1>산업·기업·거시 분석을<br><em>한 곳에서</em> 읽는다.</h1>
    <p class="hero-desc">국내 주요 증권사의 산업·기업 분석 리포트와 한국은행 공식 보고서를 정리·요약해 제공합니다. 카테고리 필터와 검색으로 원하는 자료를 빠르게 찾아보세요.</p>
  </div>
</div>

<!-- 필터 바 -->
<div class="filter-bar">
  <span class="filter-label">필터</span>
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="industry">산업 분석</button>
  <button class="filter-btn" data-cat="company">기업 분석</button>
  <button class="filter-btn" data-cat="bok">한국은행</button>
  <button class="filter-btn" data-cat="macro">경제 지표</button>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="제목·태그 검색…" />
    <svg width="13" height="13" fill="none" stroke="#8a8078" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
  </div>
</div>

<!-- 게시물 그리드 -->
<main class="page">
  <div id="post-grid"></div>
</main>

<!-- 모달 -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- 푸터 -->
<footer>
  Readysearch &mdash; 개인 리서치 아카이브 &nbsp;|&nbsp; 본 사이트의 자료는 투자 권유가 아닙니다.
</footer>

<script>
/* ================================================================
   지표 데이터 — 수동 업데이트
   숫자를 바꿀 때 이 부분만 수정하세요.
================================================================ */
const INDICATORS = [
  { label: "KOSPI",       value: "2,612.45", change: "+0.82%", dir: "up",   note: "2025.03.28" },
  { label: "KOSDAQ",      value: "739.18",   change: "-0.31%", dir: "down", note: "2025.03.28" },
  { label: "USD/KRW",     value: "1,357.50", change: "+3.20",  dir: "up",   note: "2025.03.28" },
  { label: "기준금리",    value: "3.00%",    change: "동결",   dir: "flat", note: "2025.02 결정" },
  { label: "CPI(전년비)", value: "2.1%",     change: "-0.1%p", dir: "down", note: "2025.02" },
  { label: "국고채 3Y",   value: "2.895%",   change: "-0.012", dir: "down", note: "2025.03.28" },
  { label: "WTI",         value: "$69.42",   change: "-1.2%",  dir: "down", note: "2025.03.28" },
];

const CAT_LABEL = { industry:'산업 분석', company:'기업 분석', bok:'한국은행', macro:'경제 지표' };

function renderIndicators() {
  document.getElementById('indicators-inner').innerHTML = INDICATORS.map(ind => `
    <div class="ind-item">
      <span class="ind-label">${ind.label}</span>
      <span class="ind-value">${ind.value}</span>
      <span class="ind-change ${ind.dir}">${ind.dir==='up'?'▲':ind.dir==='down'?'▼':'─'} ${ind.change}</span>
      <span class="ind-note">${ind.note}</span>
    </div>`).join('');
}

function fmtDate(d) { const [y,m,day]=d.split('-'); return `${y}.${m}.${day}`; }

function mdToHtml(md) {
  const lines = md.trim().split('\n');
  let html='', inUl=false, inOl=false, inTable=false, tableRows=[];
  const flushList=()=>{ if(inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} };
  const flushTable=()=>{
    if(!inTable)return;
    html+='<table>';
    tableRows.forEach((row,i)=>{
      if(i===1)return;
      const cells=row.split('|').map(c=>c.trim()).filter(c=>c!=='');
      const tag=i===0?'th':'td';
      html+='<tr>'+cells.map(c=>`<${tag}>${inl(c)}</${tag}>`).join('')+'</tr>';
    });
    html+='</table>'; inTable=false; tableRows=[];
  };
  const inl=s=>s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  for(const raw of lines){
    if(raw.includes('|')){ flushList();inTable=true;tableRows.push(raw);continue; } else { flushTable(); }
    if(raw.startsWith('## '))     { flushList();html+=`<h2>${inl(raw.slice(3))}</h2>`; }
    else if(raw.startsWith('### ')){ flushList();html+=`<h3>${inl(raw.slice(4))}</h3>`; }
    else if(/^\d+\.\s/.test(raw)) { if(!inOl){html+='<ol>';inOl=true;} html+=`<li>${inl(raw.replace(/^\d+\.\s/,''))}</li>`; }
    else if(raw.startsWith('- ')) { if(!inUl){html+='<ul>';inUl=true;} html+=`<li>${inl(raw.slice(2))}</li>`; }
    else if(raw.startsWith('> ')) { flushList();html+=`<blockquote>${inl(raw.slice(2))}</blockquote>`; }
    else if(raw.trim()==='')      { flushList(); }
    else                          { flushList();html+=`<p>${inl(raw)}</p>`; }
  }
  flushList(); flushTable(); return html;
}

function renderCard(p) {
  return `<article class="card" data-cat="${p.category}" data-id="${p.id}" tabindex="0">
    <div class="card-meta">
      <span class="cat-badge">${CAT_LABEL[p.category]||p.category}</span>
      <span class="card-source">${p.source}</span>
      <span class="card-date">${fmtDate(p.date)}</span>
    </div>
    <h2>${p.title}</h2>
    <p class="card-summary">${p.summary}</p>
    <div class="card-tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
  </article>`;
}

let currentFilter='all', currentSearch='';
function renderPosts() {
  const grid=document.getElementById('post-grid');
  const filtered=[...POSTS].sort((a,b)=>b.date.localeCompare(a.date)).filter(p=>{
    const catOk=currentFilter==='all'||p.category===currentFilter;
    const q=currentSearch.toLowerCase();
    return catOk&&(!q||p.title.toLowerCase().includes(q)||p.tags.some(t=>t.toLowerCase().includes(q))||p.source.toLowerCase().includes(q)||p.summary.toLowerCase().includes(q));
  });
  grid.innerHTML=filtered.length===0?'<div class="no-results">검색 결과가 없습니다.</div>':filtered.map(renderCard).join('');
  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>openModal(+c.dataset.id));
    c.addEventListener('keydown',e=>{if(e.key==='Enter')openModal(+c.dataset.id);});
  });
  document.getElementById('post-count-header').textContent=`${filtered.length} / ${POSTS.length} 건`;
}

function catBadgeStyle(cat){
  return {industry:'background:rgba(37,99,168,.1);color:#2563a8',company:'background:rgba(42,122,75,.1);color:#2a7a4b',bok:'background:rgba(184,76,30,.1);color:#b84c1e',macro:'background:rgba(124,58,173,.1);color:#7c3aad'}[cat]||'';
}

function openModal(id){
  const p=POSTS.find(x=>x.id===id); if(!p)return;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-header">
      <div class="modal-meta">
        <span class="cat-badge" style="${catBadgeStyle(p.category)}">${CAT_LABEL[p.category]}</span>
        <span style="font-size:.77rem;color:var(--text2);font-weight:500;">${p.source}</span>
        <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-left:auto;">${fmtDate(p.date)}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-summary">${p.summary}</div>
      <div class="card-tags" style="margin-top:.5rem;">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    </div>
    <div class="modal-body">${mdToHtml(p.content)}</div>`;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-backdrop').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentFilter=btn.dataset.cat; renderPosts();
  });
});
document.getElementById('search-input').addEventListener('input',e=>{currentSearch=e.target.value;renderPosts();});

renderIndicators();
renderPosts();
</script>
</body>
</html>
